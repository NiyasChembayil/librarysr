<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty | Live User Count</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SRISHTY</div>
            <div class="live-indicator">
                <span class="dot"></span> LIVE
            </div>
        </header>

        <main>
            <div class="counter-label">TOTAL REGISTERED STORYTELLERS</div>
            <div id="counter" class="digital-counter">
                <!-- Digits will be injected by JS -->
            </div>
            <div class="sub-label">JOIN THE COMMUNITY</div>
        </main>

        <footer>
            <p>&copy; 2026 Srishty Platform. All rights reserved.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
