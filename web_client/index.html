<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty | Discover Stories</title>
    <meta name="description" content="Discover trending stories, sci-fi, and fiction on Srishty.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../frontend/assets/logo.png" type="image/x-icon">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="nav-brand">
            <img src="../frontend/assets/logo.png" alt="Srishty Logo" class="nav-logo">
            <span class="nav-title">Srishty</span>
        </div>
        <div class="nav-auth" id="nav-auth-container">
            <div id="guest-nav">
                <button class="btn-primary" onclick="readerApp.openAuthModal()">Sign In to Write</button>
            </div>
            <div id="auth-nav" class="hidden user-profile">
                <span id="nav-username">Hello!</span>
                <button class="btn-primary" onclick="window.location.href='studio.html'">Author Studio</button>
                <button class="btn-secondary" onclick="readerApp.logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="book-container animate-up">
            <div class="book">
                <div class="book-cover"></div>
                <div class="book-page page-1"></div>
                <div class="book-page page-2"></div>
                <div class="book-page page-3"></div>
                <div class="book-page page-4"></div>
                <div class="book-back"></div>
            </div>
        </div>
        <div class="hero-content">
            <h1 class="animate-up">Your Stories, Amplified.</h1>
            <p class="animate-up" style="animation-delay: 0.1s;">Join a community of authors. Sign in to start writing and sharing your masterpieces with the world.</p>
            <div class="hero-actions animate-up" style="animation-delay: 0.2s;" id="hero-cta-container">
                <button class="btn-primary large" id="hero-main-btn" onclick="readerApp.openAuthModal()">Sign In to Start Writing</button>
            </div>
        </div>
        <div class="hero-glow"></div>
    </header>

    <main class="container">
        <!-- My Works Section (Visible when logged in) -->
        <section id="my-works-section" class="hidden animate-up" style="margin-bottom: 60px;">
            <div class="section-header">
                <h2>My Masterpieces</h2>
                <div class="section-dash"></div>
            </div>
            <div class="book-grid" id="my-books-container">
                <!-- My books will be injected here -->
            </div>
        </section>

        <!-- Explorer content removed to focus on writers -->
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content glass">
            <button class="modal-close" onclick="readerApp.closeAuthModal()">&times;</button>
            <h2 id="auth-title" style="margin-bottom: 20px;">Sign In</h2>
            
            <form id="auth-form" onsubmit="readerApp.handleAuthSubmit(event)">
                <div class="form-group" id="username-group">
                    <label>Username</label>
                    <input type="text" id="auth-username" class="form-control" required>
                </div>
                <div class="form-group hidden" id="email-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" class="form-control">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" class="form-control" required>
                </div>
                
                <p id="auth-error" style="color: #ff6b6b; margin-bottom: 15px; font-size: 14px; display: none;"></p>
                
                <button type="submit" class="btn-primary" style="width: 100%;" id="auth-submit-btn">Sign In</button>
            </form>
            
            <div style="margin-top: 20px; text-align: center; color: var(--text-secondary); font-size: 14px;">
                <span id="auth-toggle-text">New to Srishty?</span> 
                <a href="#" onclick="readerApp.toggleAuthMode(event)" style="color: var(--accent-blue); text-decoration: none; font-weight: bold;" id="auth-toggle-link">Create Account</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
