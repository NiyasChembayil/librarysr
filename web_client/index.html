<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty Author Gateway</title>
    <meta name="description" content="Srishty Author Gateway. Sign in to write and publish your stories.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../frontend/assets/logo.png" type="image/x-icon">
    <style>
        /* Inline styling to center the new auth block and gallery cleanly */
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gallery-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="nav-brand">
            <img src="../frontend/assets/logo.png" alt="Srishty Logo" class="nav-logo">
            <span class="nav-title">Srishty Studio</span>
        </div>
        <div class="nav-auth" id="nav-auth-container">
            <div id="guest-nav" class="hidden">
                <!-- Empty for a cleaner gate -->
            </div>
            <div id="auth-nav" class="hidden user-profile">
                <span id="nav-username">Hello!</span>
                <button class="btn-secondary" onclick="readerApp.logout()">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Auth Section (Visible when logged out) -->
        <section id="auth-section" class="auth-container animate-up">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="../frontend/assets/logo.png" alt="Logo" style="width: 60px; height: 60px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);">
                <h2 id="auth-title">Sign In</h2>
                <p style="color: var(--text-secondary); margin-top: 5px;">Enter the author portal</p>
            </div>
            
            <form id="auth-form" onsubmit="readerApp.handleAuthSubmit(event)">
                <div class="form-group" id="username-group">
                    <label>Username</label>
                    <input type="text" id="auth-username" class="form-control" placeholder="Your username" required>
                </div>
                <div class="form-group hidden" id="email-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" class="form-control" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" class="form-control" placeholder="********" required>
                </div>
                
                <p id="auth-error" style="color: #ff6b6b; margin-bottom: 15px; font-size: 14px; display: none;"></p>
                
                <button type="submit" class="btn-primary" style="width: 100%;" id="auth-submit-btn">Sign In</button>
            </form>
            
            <div style="margin-top: 25px; text-align: center; color: var(--text-secondary); font-size: 14px;">
                <span id="auth-toggle-text">New Author?</span> 
                <a href="#" onclick="readerApp.toggleAuthMode(event)" style="color: var(--accent-blue); text-decoration: none; font-weight: bold;" id="auth-toggle-link">Create Account</a>
            </div>
        </section>

        <!-- My Works Section (Visible when logged in) -->
        <section id="my-works-section" class="gallery-container hidden animate-up">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div>
                    <h1 style="font-size: 32px; background: linear-gradient(to right, #fff, #a09df0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">My Work Gallery</h1>
                    <p style="color: var(--text-secondary);">Manage your masterpieces or start a new journey.</p>
                </div>
                <button class="btn-primary large" onclick="readerApp.startNewBook()">+ Create New Book</button>
            </div>
            
            <div class="book-grid" id="my-books-container">
                <!-- My books will be injected here -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
