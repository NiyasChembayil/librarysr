<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Srishty | Srishty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../frontend/assets/logo.png" type="image/x-icon">
</head>
<body class="auth-page">
    <div class="auth-card animate-up">
        <img src="../frontend/assets/logo.png" alt="Srishty Logo" class="auth-logo">
        <h1>Join Srishty</h1>
        <p>Start your creative journey today</p>

        <div id="auth-error" class="auth-error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-message"></span>
        </div>

        <div id="auth-success" class="auth-error" style="background: rgba(76, 175, 80, 0.1); color: #4CAF50; border-color: rgba(76, 175, 80, 0.2);">
            <i class="fas fa-check-circle"></i>
            <span>Account created! Redirecting to login...</span>
        </div>

        <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-container">
                    <i class="far fa-user"></i>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required minlength="3">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-container">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
                </div>
            </div>

            <button type="submit" id="signup-btn" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://srishty-backend.onrender.com/api';

        async function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signup-btn');
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');
            const errorMsg = document.getElementById('error-message');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'Creating Account...';

            try {
                const response = await fetch(`${API_BASE_URL}/accounts/auth/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role: 'author' })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Registration failed. Username or email may exist.');
                }

                successEl.style.display = 'flex';
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                errorMsg.innerText = error.message;
                errorEl.style.display = 'flex';
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        }

        // Check if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
