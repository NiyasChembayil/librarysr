databases:
  - name: srishty-db
    databaseName: srishty
    user: srishty_user
    plan: free

services:
  - type: web
    name: srishty-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    releaseCommand: "python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT bookify_backend.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: srishty-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: RENDER_EXTERNAL_HOSTNAME
        value: "srishty-backend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CLOUDINARY_URL
        sync: false # User must set this manually in the dashboard
  - type: web
    name: srishty-client
    runtime: static
    rootDir: web_client
    staticPublishPath: "."

  - type: web
    name: srishty-admin
    runtime: static
    rootDir: web_admin
    staticPublishPath: "."
