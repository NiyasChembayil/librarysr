<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srishty | Live Community Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --accent: #00D2FF;
            --bg: #0A0A12;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(108, 99, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 80px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .label {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }

        .count {
            font-family: 'Outfit', sans-serif;
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #FFF 0%, #6C63FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
        }

        .status {
            display: inline-flex;
            align-items: center;
            background: rgba(67, 233, 123, 0.1);
            color: #43E97B;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(67, 233, 123, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #43E97B;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #43E97B;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .footer {
            position: fixed;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 40px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="logo">SRISHTY</span>
        
        <div class="glass-card">
            <div class="label">Total Global Community</div>
            <div id="counter" class="count">0</div>
            <div class="status">
                <div class="status-dot"></div>
                LIVE UPDATING
            </div>
        </div>

        <div class="footer">
            Real-time data from Srishty Backend Engine
        </div>
    </div>

    <script>
        const counterEl = document.getElementById('counter');
        let currentCount = 0;

        async function updateCounter() {
            try {
                const response = await fetch('/api/accounts/global_stats/');
                const data = await response.json();
                const target = data.total_users || 0;
                
                animateValue(currentCount, target, 2000);
                currentCount = target;
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        function animateValue(start, end, duration) {
            if (start === end) return;
            const range = end - start;
            let current = start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            
            const timer = setInterval(() => {
                current += increment;
                counterEl.innerText = current;
                if (current == end) {
                    clearInterval(timer);
                }
            }, stepTime || 10);
        }

        // Initial fetch
        updateCounter();
        
        // Refresh every 10 seconds
        setInterval(updateCounter, 10000);
    </script>
</body>
</html>
